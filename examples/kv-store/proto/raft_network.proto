syntax = "proto3";

package raft_kv;

service RaftNetwork {
  rpc RequestVote (GRequestVoteRequest) returns (GRequestVoteResponse);
  rpc AppendEntries (GAppendEntriesRequest) returns (GAppendEntriesResponse);
  rpc InstallSnapshot (GInstallSnapshotRequest) returns (GInstallSnapshotResponse);
}

service ClientNetwork {
  rpc RegisterClient (GRegisterClientRequest) returns (GClientReply);
  rpc SendCommand (GClientCommandRequest) returns (GClientReply);
}

// "G" prefixes added because of conflicts with core structure names

message GRequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message GRequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message GAppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  bytes serialized_entries = 5; // Serialized Vec<LogEntry>
  uint64 leader_commit = 6;
}

message GAppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 conflict_index = 3;
  uint64 last_log_index = 4;
}

message GRegisterClientRequest {}

message GClientCommandRequest {
  uint64 client_id = 1;
  uint64 seq_num = 2;
  uint64 last_received_seq = 3;
  bytes command_payload = 4;
}

message GClientReply {
  oneof result {
    bytes success_data = 1;
    string error_msg = 2;
    uint64 redirect_leader_id = 3;
  }
}

message GInstallSnapshotRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5; // binary encoded state
}

message GInstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
}
